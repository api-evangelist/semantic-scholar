aid: semantic-scholar
name: Semantic Scholar
description: >
  Semantic Scholar is a free, AI-powered academic search engine developed by the Allen
  Institute for AI (AI2) that indexes over 214 million scholarly papers with 2.49 billion
  citations and 79 million authors. The platform provides a public REST API organized into
  three services: Academic Graph (papers, authors, citations, venues, and SPECTER2 embeddings),
  Recommendations (paper similarity and interest-based suggestions), and Datasets (bulk
  downloadable corpus snapshots updated monthly). API access is available without authentication
  at a shared rate limit, or with a free API key obtained via request for a dedicated 1 RPS
  allowance. Semantic Scholar supports AI agent integrations through multiple community-built
  MCP servers that expose its academic graph to LLM-based toolchains.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
