created: '2026-06-12'
modified: '2026-06-12'
specificationVersion: '0.19'
apis:
  - name: Semantic Scholar Academic Graph API
    description: >
      RESTful API providing access to 214M+ academic papers, 79M authors, 2.49B citations,
      venues, and SPECTER2 vector embeddings. Supports single-item lookups, keyword search,
      bulk retrieval, and citation/reference traversal.
    humanURL: https://www.semanticscholar.org/product/api
    baseURL: https://api.semanticscholar.org/graph/v1
    tags:
      - Papers
      - Authors
      - Citations
      - Search
      - Embeddings
    properties:
      - type: Documentation
        url: https://api.semanticscholar.org/api-docs/
      - type: OpenAPI
        url: openapi/semantic-scholar-academic-graph-openapi.yml
  - name: Semantic Scholar Recommendations API
    description: >
      Returns recommended papers similar to a given publication or aligned with a learned
      model of a researcher's topical interests. Supports both single-paper and multi-paper
      positive/negative input modes.
    humanURL: https://www.semanticscholar.org/product/api
    baseURL: https://api.semanticscholar.org/recommendations/v1
    tags:
      - Recommendations
      - Papers
      - Machine Learning
    properties:
      - type: Documentation
        url: https://api.semanticscholar.org/api-docs/recommendations
      - type: OpenAPI
        url: openapi/semantic-scholar-recommendations-openapi.yml
  - name: Semantic Scholar Datasets API
    description: >
      Provides downloadable bulk snapshots of the full Semantic Scholar academic graph,
      updated monthly. Supports incremental diff downloads between releases. Requires
      an API key for authentication.
    humanURL: https://www.semanticscholar.org/product/api
    baseURL: https://api.semanticscholar.org/datasets/v1
    tags:
      - Datasets
      - Bulk Download
      - Corpus
    properties:
      - type: Documentation
        url: https://api.semanticscholar.org/api-docs/
      - type: OpenAPI
        url: openapi/semantic-scholar-datasets-openapi.yml
