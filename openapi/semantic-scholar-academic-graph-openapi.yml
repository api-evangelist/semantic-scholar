            pages: 116 - 135
            name: IETE Technical Review
        citationStyles:
          type: object
          description: The BibTex bibliographical citation of the paper.
          example:
            bibtex: "@['JournalArticle', 'Conference']{Ammar2018ConstructionOT,\n\
              \ author = {Waleed Ammar and Dirk Groeneveld and Chandra Bhagavatula\
              \ and Iz Beltagy and Miles Crawford and Doug Downey and Jason Dunkelberger\
              \ and Ahmed Elgohary and Sergey Feldman and Vu A. Ha and Rodney Michael\
